<!DOCTYPE html><!<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVERLY | THE VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,900&family=Inter:wght@100;400;900&display=swap" rel="stylesheet">
    <style>
        :root { --g: #d4af37; --b: #000; --w: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* הממשק זז הצידה - Horizontal Scroll */
        .viewport { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 100vh; scroll-behavior: smooth; }
        .page { min-width: 100vw; height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* לוגו צף */
        .brand { position: fixed; top: 50px; left: 50px; z-index: 100; font-family: 'Bodoni Moda', serif; font-size: 30px; mix-blend-mode: difference; }
        
        /* מספר מוצר ענק ברקע */
        .bg-text { position: absolute; font-size: 40vw; font-weight: 900; opacity: 0.05; z-index: 0; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        .product-wrap { position: relative; z-index: 10; width: 80%; display: flex; align-items: center; gap: 50px; }
        .img-box { width: 500px; height: 600px; background: #111; border: 1px solid #222; overflow: hidden; position: relative; }
        .img-box::after { content: ''; position: absolute; inset: 0; background: linear-gradient(45deg, transparent, rgba(212,175,55,0.1)); }
        
        /* תמונות דמו איכותיות */
        #p1 { background: url('https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&w=1000') center/cover; }
        #p2 { background: url('https://images.unsplash.com/photo-1599643477877-537ef5278533?q=80&w=1000') center/cover; }
        #p3 { background: url('https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?q=80&w=1000') center/cover; }

        .details { text-align: right; }
        .title { font-family: 'Bodoni Moda', serif; font-size: 80px; line-height: 0.8; margin-bottom: 20px; }
        .price { font-size: 20px; letter-spacing: 5px; color: var(--g); margin-bottom: 40px; }
        
        .buy-btn { background: none; border: 1px solid var(--w); color: var(--w); padding: 20px 40px; text-transform: uppercase; letter-spacing: 5px; transition: 0.4s; }
        .buy-btn:hover { background: var(--w); color: var(--b); }

        .nav-hint { position: fixed; bottom: 50px; right: 50px; font-size: 12px; letter-spacing: 3px; color: var(--g); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .product-wrap { flex-direction: column; text-align: center; }
            .img-box { width: 100%; height: 40vh; }
            .title { font-size: 40px; }
            .brand { left: 20px; top: 20px; }
        }
    </style>
</head>
<body>

    <div class="brand">EVERLY.</div>
    <div class="nav-hint">SWIPE TO EXPLORE →</div>

    <div class="viewport">
        <div class="page">
            <div class="bg-text">01</div>
            <div class="product-wrap">
                <div class="img-box" id="p1"></div>
                <div class="details">
                    <h2 class="title">ARMORED<br>BRACELET</h2>
                    <p class="price">₪179 / TACTICAL STEEL</p>
                    <button class="buy-btn" onclick="order('צמיד לוחם')">CUSTOMIZE</button>
                </div>
            </div>
        </div>

        <div class="page">
            <div class="bg-text">02</div>
            <div class="product-wrap">
                <div class="img-box" id="p2"></div>
                <div class="details">
                    <h2 class="title">VISION<br>NECKLACE</h2>
                    <p class="price">₪189 / PURE PROJECTION</p>
                    <button class="buy-btn" onclick="order('שרשרת הקרנה')">CUSTOMIZE</button>
                </div>
            </div>
        </div>

        <div class="page">
            <div class="bg-text">03</div>
            <div class="product-wrap">
                <div class="img-box" id="p3"></div>
                <div class="details">
                    <h2 class="title">SIGNATURE<br>PENDANT</h2>
                    <p class="price">₪169 / LASER ETCHED</p>
                    <button class="buy-btn" onclick="order('תליון חריטה')">CUSTOMIZE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function order(item) {
            const name = prompt("שם מלא להזמנה:");
            if(name) {
                const text = `שלום EVERLY, אני מעוניין ב${item}. שם: ${name}`;
                window.open(`https://wa.me/972548094964?text=${encodeURIComponent(text)}`);
            }
        }
    </script>
</body>
</html>
