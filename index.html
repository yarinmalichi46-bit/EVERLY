<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVERLY | Luxury Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;600&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --soft-gold: #f1e5ac;
            --black: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--black);
            color: var(--white);
            background-image: radial-gradient(circle at top right, #1a1a1a 0%, #050505 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&q=80') center/cover;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(transparent, var(--black));
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(60px, 15vw, 120px);
            font-weight: 200;
            letter-spacing: 20px;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            margin-right: 20px; /* תיקון בגלל ה-letter spacing */
        }

        .tagline {
            font-size: 18px;
            letter-spacing: 5px;
            color: var(--soft-gold);
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: -20px;
        }

        .container {
            max-width: 1400px;
            margin: -100px auto 0;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 2px;
            padding: 15px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-15px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .product-image {
            width: 100%;
            height: 450px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .product-image::before {
            content: 'COLLECTION 2026';
            font-size: 10px;
            letter-spacing: 3px;
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--gold);
        }

        .product-info {
            padding: 30px 10px;
            text-align: center;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--white);
            margin-bottom: 15px;
        }

        .product-price {
            font-size: 22px;
            color: var(--gold);
            font-weight: 300;
            margin-bottom: 25px;
        }

        .btn {
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 18px 40px;
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s;
            width: 100%;
        }

        .btn:hover {
            background: var(--gold);
            color: var(--black);
        }

        /* מודל בעיצוב נקי */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(20px);
        }

        .modal-content {
            max-width: 500px;
            margin: 5vh auto;
            padding: 60px 40px;
            border-left: 1px solid var(--gold);
        }

        input, textarea {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid #333;
            padding: 20px 0;
            color: white;
            margin-bottom: 30px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.4s;
        }

        input:focus { border-color: var(--gold); }

        footer {
            padding: 100px 20px;
            text-align: center;
            opacity: 0.5;
            letter-spacing: 2px;
            font-size: 11px;
        }

        @media (max-width: 768px) {
            .logo { font-size: 50px; letter-spacing: 10px; }
            .container { margin-top: -50px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">EVERLY</div>
    <div class="tagline">The Art of Connection</div>
</header>

<div class="container">
    <div class="gallery">
        <div class="product-card">
            <div class="product-image">ARMY EDITION</div>
            <div class="product-info">
                <div class="product-name">צמיד לוחם טקטי</div>
                <div class="product-price">₪179</div>
                <button class="btn" onclick="openModal('צמיד לוחם טקטי')">התאמה אישית</button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">LEGACY PIECE</div>
            <div class="product-info">
                <div class="product-name">שרשרת הקרנה יוקרטית</div>
                <div class="product-price">₪189</div>
                <button class="btn" onclick="openModal('שרשרת הקרנה')">התאמה אישית</button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">SIGNATURE</div>
            <div class="product-info">
                <div class="product-name">תליון חריטה אישי</div>
                <div class="product-price">₪169</div>
                <button class="btn" onclick="openModal('תליון חריטה')">התאמה אישית</button>
            </div>
        </div>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Playfair Display'; color:var(--gold); margin-bottom:40px; font-size:35px;">הזמנה אישית</h2>
        <input type="text" id="customerName" placeholder="שם מלא">
        <input type="tel" id="customerPhone" placeholder="טלפון ליצירת קשר">
        <textarea id="customerMessage" placeholder="פרטי החריטה או הבקשה שלך..."></textarea>
        <button class="btn" onclick="sendWhatsApp()">שלח בקשה ל-WhatsApp</button>
        <p onclick="closeModal()" style="color:#555; cursor:pointer; margin-top:30px; text-align:center; font-size:12px; letter-spacing:2px;">חזור</p>
    </div>
</div>

<footer>
    <p>EVERLY LUXURY JEWELRY &copy; 2026</p>
</footer>

<script>
    const businessPhone = '972548094964';
    let selectedProduct = '';

    function openModal(name) {
        selectedProduct = name;
        document.getElementById('orderModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('orderModal').style.display = 'none';
    }

    function sendWhatsApp() {
        const name = document.getElementById('customerName').value;
        const phone = document.getElementById('customerPhone').value;
        const msg = document.getElementById('customerMessage').value;
        
        if(!name || !phone) return alert('אנא מלא פרטי קשר');

        const text = `שלום EVERLY, אני מעוניין בהתאמה אישית ל${selectedProduct}:%0Aשם: ${name}%0Aטלפון: ${phone}%0Aבקשה: ${msg}`;
        window.open(`https://wa.me/${businessPhone}?text=${text}`, '_blank');
    }
</script>

</body>
</html>
