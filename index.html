<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVERLY | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --black: #000000;
            --gray: #0a0a0a;
            --light-gray: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--black);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Hero Section - High End Magazine Look */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            border-bottom: 1px solid #111;
        }

        .logo-wrap {
            position: relative;
        }

        .logo {
            font-size: clamp(45px, 15vw, 80px);
            font-weight: 100;
            letter-spacing: 12px;
            color: #fff;
            line-height: 1;
            margin-bottom: 10px;
        }

        .logo span {
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #444;
            margin-top: 10px;
        }

        /* Product Section - Full Height Stack */
        .product-section {
            padding: 20px;
            display: grid;
            gap: 100px;
            margin-top: 50px;
        }

        .product-card {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .image-container {
            width: 100%;
            height: 70vh;
            background: var(--gray);
            overflow: hidden;
            position: relative;
            border: 1px solid #111;
        }

        /* תמונות דמו איכותיות מאוד */
        #img1 { background: url('https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&w=1000&auto=format&fit=crop') center/cover; }
        #img2 { background: url('https://images.unsplash.com/photo-1599643477877-537ef5278533?q=80&w=1000&auto=format&fit=crop') center/cover; }
        #img3 { background: url('https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?q=80&w=1000&auto=format&fit=crop') center/cover; }

        .product-image {
            width: 100%;
            height: 100%;
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .content-box {
            position: absolute;
            bottom: -30px;
            left: 20px;
            background: var(--black);
            padding: 30px;
            border-left: 3px solid var(--gold);
            width: calc(100% - 40px);
            z-index: 2;
        }

        .product-num {
            font-size: 10px;
            color: var(--gold);
            margin-bottom: 5px;
            display: block;
        }

        .product-name {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .price {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .order-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--gold);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .order-btn svg { width: 20px; fill: #000; }

        /* Modal - Minimalist Slide Up */
        .modal {
            display: none;
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-inner {
            position: absolute;
            bottom: 0; width: 100%;
            background: var(--light-gray);
            padding: 40px;
            border-radius: 30px 30px 0 0;
            text-align: center;
        }

        input, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #222;
            padding: 20px;
            color: #fff;
            margin-bottom: 15px;
            font-family: inherit;
            border-radius: 10px;
        }

        .submit-btn {
            background: var(--gold);
            color: #000;
            padding: 20px;
            width: 100%;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 10px;
        }

        footer {
            padding: 100px 40px;
            text-align: center;
            font-size: 9px;
            letter-spacing: 3px;
            color: #333;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            header { padding: 20px; }
            .image-container { height: 50vh; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-wrap">
        <h1 class="logo">EVE<span>RLY</span></h1>
        <p class="tagline">Luxury Tactical Goods</p>
    </div>
</header>

<div class="product-section">
    <div class="product-card">
        <div class="image-container">
            <div class="product-image" id="img1"></div>
            <button class="order-btn" onclick="openModal('צמיד לוחם טקטי')">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
        </div>
        <div class="content-box">
            <span class="product-num">01 / EDITION</span>
            <h2 class="product-name">צמיד לוחם טקטי</h2>
            <p class="price">₪179</p>
        </div>
    </div>

    <div class="product-card">
        <div class="image-container">
            <div class="product-image" id="img2"></div>
            <button class="order-btn" onclick="openModal('שרשרת הקרנה')">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
        </div>
        <div class="content-box">
            <span class="product-num">02 / LEGACY</span>
            <h2 class="product-name">שרשרת הקרנה יוקרטית</h2>
            <p class="price">₪189</p>
        </div>
    </div>

    <div class="product-card">
        <div class="image-container">
            <div class="product-image" id="img3"></div>
            <button class="order-btn" onclick="openModal('תליון חריטה')">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
        </div>
        <div class="content-box">
            <span class="product-num">03 / SIGNATURE</span>
            <h2 class="product-name">תליון חריטה אישי</h2>
            <p class="price">₪169</p>
        </div>
    </div>
</div>

<div id="orderModal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-inner">
        <div style="width:40px; height:4px; background:#333; margin:0 auto 30px; border-radius:2px;"></div>
        <h2 style="margin-bottom:30px; font-weight:300;">הזמנה אישית</h2>
        <input type="text" id="customerName" placeholder="שם מלא">
        <input type="tel" id="customerPhone" placeholder="טלפון">
        <textarea id="customerMessage" placeholder="מה תרצה לחרוט?" rows="3"></textarea>
        <button class="submit-btn" onclick="sendWhatsApp()">שליחה לוואטסאפ</button>
        <p onclick="closeModal()" style="margin-top:20px; color:#555; font-size:12px;">סגור</p>
    </div>
</div>

<footer>
    <p>EVERLY &copy; 2026 | MILITARY GRADE JEWELRY</p>
</footer>

<script>
    const businessPhone = '972548094964';
    let currentItem = '';

    function openModal(name) {
        currentItem = name;
        document.getElementById('orderModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('orderModal').style.display = 'none';
    }

    function sendWhatsApp() {
        const name = document.getElementById('customerName').value;
        const phone = document.getElementById('customerPhone').value;
        const msg = document.getElementById('customerMessage').value;
        if(!name || !phone) return alert('אנא מלא פרטים');
        
        const text = `שלום EVERLY, הזמנה חדשה:%0Aמוצר: ${currentItem}%0Aשם: ${name}%0Aטלפון: ${phone}%0Aחריטה: ${msg}`;
        window.open(`https://wa.me/${businessPhone}?text=${text}`);
    }
</script>

</body>
</html>
